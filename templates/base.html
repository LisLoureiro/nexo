<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Nexo Governamental — Conectando governo e sociedade{% endblock %}</title>
  <meta name="description" content="Plataforma da Secretaria de Governo para articulação, transparência e resultados." />
  <meta property="og:title" content="Nexo Governamental" />
  <meta property="og:description" content="Conectando governo e sociedade." />
  <style>
    :root {
      --navy: #1a1f5e;
      --yellow: #f5c200;
      --dark-bg: #1a1f5e;
      --light-bg: #ffffff;
      --text-white: #ffffff;
      --text-muted: rgba(255,255,255,0.75);
      --border-light: rgba(255,255,255,0.1);
      --border-medium: rgba(255,255,255,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--dark-bg);
      color: var(--text-white);
      line-height: 1.6;
    }

    /* Melhorar contraste e legibilidade */
    body {
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    /* Ajustar contraste do texto */
    .text-muted {
      color: rgba(255,255,255,0.85) !important;
    }

    /* Aumentar contraste de links e interações */
    nav ul a {
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    /* Melhor contraste nos títulos */
    h1, h2, h3, h4, h5, h6 {
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
    }
    .logo {
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .logo span { color: var(--yellow); }
    nav ul {
      display: flex;
      gap: 2rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav .admin-btn {
      background: var(--yellow);
      color: var(--navy);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      margin-left: 1rem;
    }

    nav .admin-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    nav ul a {
      color: white;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.85;
      transition: all 0.2s;
    }
    nav ul a:hover { opacity: 1; color: var(--yellow); }

    /* ── FLASH ── */
    .flash {
      padding: .8rem 2.5rem;
      font-weight: 600;
      font-size: .9rem;
      border-left: 4px solid;
      border-radius: 4px;
      margin: 1rem 0;
    }
    .flash.success {
      background: rgba(74, 222, 128, 0.1);
      color: white;
      border-color: #22c55e;
    }
    .flash.error   {
      background: rgba(248, 113, 113, 0.1);
      color: white;
      border-color: #ef4444;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2.5rem;
    }

    .content {
      max-width: 1100px;
      margin: 0 auto;
    }

    .content {
      flex: 1;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      color: white;
      text-align: center;
      padding: 3rem 2.5rem;
      font-size: .9rem;
      margin-top: 4rem;
      border-top: 1px solid var(--border-light);
    }

    .footer-content {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .footer-logo {
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .footer-logo span { color: var(--yellow); }

    .footer-links {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .footer-links a {
      color: var(--yellow);
      text-decoration: none;
      font-size: 0.9rem;
      transition: opacity 0.3s;
    }

    .footer-links a:hover {
      opacity: 0.8;
    }

    .footer-copyright {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 1rem;
    }

    @media (max-width: 768px) {
      .footer-links {
        flex-direction: column;
        gap: 1rem;
      }
    }

    /* ── CARDS ── */
    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: all 0.3s ease;
    }
    .card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* ── BUTTONS ── */
    .btn {
      padding: .75rem 1.5rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
      border: none;
    }
    .btn-primary {
      background: var(--yellow);
      color: var(--navy);
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: transparent;
      color: var(--text-white);
      border: 1px solid var(--border-medium);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--yellow);
      color: var(--yellow);
    }

    /* ── TABLES ── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }
    th {
      background: rgba(255, 255, 255, 0.05);
      font-weight: 700;
      color: white;
    }
    tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    /* ── FORMS ── */
    input, select, textarea {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-light);
      padding: .75rem;
      border-radius: 4px;
      font-family: inherit;
      color: var(--text-white);
      width: 100%;
      transition: all 0.3s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--yellow);
      background: rgba(255, 255, 255, 0.08);
    }
    input::placeholder, textarea::placeholder {
      color: var(--text-muted);
    }

    /* ── HEADINGS ── */
    h1, h2, h3, h4, h5, h6 {
      color: white;
      margin-bottom: 1rem;
    }
    h1 { font-size: 2rem; font-weight: 900; }
    h2 { font-size: 1.5rem; font-weight: 700; }
    h3 { font-size: 1.25rem; font-weight: 600; }

    /* ─── UTILITIES ─── */
    .container { max-width: 1200px; margin: 0 auto; }
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 1.5rem;
    }
    .text-muted { color: var(--text-muted); }
    .mb-2 { margin-bottom: 1rem; }
    .mb-3 { margin-bottom: 1.5rem; }
    .mb-4 { margin-bottom: 2rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mt-4 { margin-top: 2rem; }
    .flex { display: flex; }
    .gap-2 { gap: 1rem; }
    .gap-3 { gap: 1.5rem; }
    .justify-between { justify-content: space-between; }
    .items-center { align-items: center; }
    .p-4 { padding: 1.5rem; }
    .grid { display: grid; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
      main { padding: 2rem 1.5rem; }
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <div class="logo">Nexo <span>Governamental</span></div>
    <ul>
      <li><a href="{{ url_for('home') }}">Início</a></li>
      <li><a href="/sobre">Sobre</a></li>
      <li><a href="{{ url_for('noticias') }}">Notícias</a></li>
      <li><a href="{{ url_for('secretarias') }}">Eixos</a></li>
      <li><a href="#">Contato</a></li>
      <li><a href="{{ url_for('admin_login') }}" class="admin-btn">Admin</a></li>
    </ul>
  </nav>

  <div class="content">
    {% block content %}{% endblock %}
  </div>

  <footer>
    <div class="footer-content">
      <div class="footer-logo">Nexo <span>Governamental</span></div>

      <div class="footer-links">
        <a href="https://instagram.com/nexogovernamental" target="_blank" rel="noopener">
          📷 Instagram @nexogovernamental
        </a>
        <a href="mailto:contato@nexogovernamental.gov.br" target="_blank">
          📧 contato@nexogovernamental.gov.br
        </a>
      </div>

      <div class="footer-copyright">
        © {{ now.year }} Nexo Governamental. Todos os direitos reservados.
      </div>
    </div>
  </footer>

</body>
</html>
