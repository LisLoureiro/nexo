<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Nexo News Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Source Sans 3',sans-serif; background:#f0f2ff; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-box { background:#fff; width:360px; border-top:5px solid #4f5de8; padding:2.5rem 2rem; box-shadow:0 8px 32px rgba(13,27,75,.12); }
    .login-logo { text-align:center; margin-bottom:2rem; }
    .login-logo span { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1.5rem; color:#0d1b4b; }
    .login-logo .news { background:#4f5de8; color:#fff; padding:.05rem .4rem; border-radius:4px; margin-left:.2rem; }
    .login-logo .sub { display:block; font-size:.72rem; color:#9aa0c8; text-transform:uppercase; letter-spacing:.12em; margin-top:.3rem; font-weight:600; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:.78rem; font-weight:700; color:#0d1b4b; margin-bottom:.3rem; text-transform:uppercase; letter-spacing:.05em; }
    .form-control { width:100%; padding:.55rem .8rem; border:1.5px solid #d0d5f0; font-family:inherit; font-size:.92rem; border-radius:4px; outline:none; }
    .form-control:focus { border-color:#4f5de8; }
    .btn-login { width:100%; padding:.65rem; background:#0d1b4b; color:#fff; border:none; font-family:'Montserrat',sans-serif; font-weight:900; font-size:.95rem; border-radius:4px; cursor:pointer; margin-top:.5rem; transition:background .2s; }
    .btn-login:hover { background:#4f5de8; }
    .flash { padding:.65rem .9rem; margin-bottom:1rem; font-size:.85rem; font-weight:600; border-radius:4px; background:#fde8e8; color:#7a1010; border-left:4px solid #e05252; }
    .back-link { text-align:center; margin-top:1.2rem; font-size:.8rem; }
    .back-link a { color:#9aa0c8; text-decoration:none; }
    .back-link a:hover { color:#4f5de8; }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <span>NEXO<span class="news">NEWS</span></span>
    <span class="sub">Área Administrativa</span>
  </div>
  {% with messages = get_flashed_messages(with_categories=True) %}
    {% for cat, msg in messages %}
      <div class="flash">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="post">
    <div class="form-group">
      <label for="usuario">Usuário</label>
      <input id="usuario" name="usuario" class="form-control" type="text" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label for="senha">Senha</label>
      <input id="senha" name="senha" class="form-control" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Entrar</button>
  </form>
  <div class="back-link"><a href="{{ url_for('index') }}">← Voltar ao portal</a></div>
</div>
</body>
</html>
