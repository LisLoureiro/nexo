<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Secretaria{% endblock %} — Nexo News</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --navy:#0d1b4b; --navy2:#132060; --accent:#4f5de8; --glow:#6c7cff;
      --paper:#f0f2ff; --white:#fff; --muted:#5a6080; --border:#d0d5f0;
      --sidebar-w:250px;
    }
    body { font-family:'Source Sans 3',sans-serif; background:var(--paper); color:var(--navy); min-height:100vh; }

    /* TOP BAR */
    .topbar {
      background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
      display:flex; align-items:center; justify-content:space-between;
      padding:.65rem 1.5rem; font-size:.8rem;
    }
    .topbar-brand { font-family:'Montserrat',sans-serif; font-weight:900; color:#fff; font-size:1rem; text-decoration:none; display:flex; align-items:center; gap:.3rem; }
    .topbar-brand .n { background:var(--accent); color:#fff; padding:.05rem .3rem; border-radius:3px; font-size:.85rem; }
    .topbar-links { display:flex; gap:1.2rem; }
    .topbar-links a { color:rgba(255,255,255,.45); text-decoration:none; font-size:.78rem; }
    .topbar-links a:hover { color:var(--glow); }

    /* LAYOUT */
    .shell { display:flex; min-height:calc(100vh - 36px); }

    /* SIDEBAR */
    .sidebar {
      width:var(--sidebar-w); background:var(--white);
      border-right:2px solid var(--border);
      flex-shrink:0; display:flex; flex-direction:column;
      position:sticky; top:0; height:100vh; overflow-y:auto;
    }
    .sec-header {
      background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 100%);
      padding:1.4rem 1.3rem; border-bottom:3px solid var(--accent);
    }
    .sec-label { font-size:.62rem; text-transform:uppercase; letter-spacing:.14em; color:rgba(255,255,255,.4); margin-bottom:.4rem; }
    .sec-nome { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1rem; color:#fff; line-height:1.25; }
    .sidebar-nav { padding:.5rem 0; flex:1; }
    .sidebar-nav a {
      display:flex; align-items:center; gap:.65rem;
      padding:.62rem 1.3rem; color:var(--muted); text-decoration:none;
      font-size:.83rem; font-weight:700; border-left:3px solid transparent;
      transition:all .14s; letter-spacing:.01em;
    }
    .sidebar-nav a:hover { background:#f4f5ff; color:var(--navy); border-left-color:var(--border); }
    .sidebar-nav a.active { background:#eaecff; color:var(--accent); border-left-color:var(--accent); }
    .sidebar-nav .icon { width:1.1rem; text-align:center; font-size:.95rem; }
    .sidebar-nav .sep { font-size:.6rem; text-transform:uppercase; letter-spacing:.14em; color:#c0c8e8; padding:.7rem 1.3rem .2rem; font-weight:700; }
    .sidebar-back { padding:.9rem 1.3rem; border-top:1px solid var(--border); }
    .sidebar-back a { color:#b0b8d8; text-decoration:none; font-size:.78rem; font-weight:600; }
    .sidebar-back a:hover { color:var(--accent); }

    /* MAIN */
    .main-content { flex:1; padding:2rem; overflow:auto; min-width:0; }
    .page-head { margin-bottom:1.8rem; }
    .page-head h1 { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1.75rem; color:var(--navy); }
    .page-head p  { color:var(--muted); margin-top:.3rem; font-size:.9rem; }

    /* STAT ROW */
    .stat-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:1rem; margin-bottom:2rem; }
    .stat-box { background:var(--white); padding:1.1rem 1rem; border-top:3px solid var(--accent); border-radius:0 0 4px 4px; }
    .stat-box .n { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1.9rem; color:var(--accent); line-height:1; }
    .stat-box .l { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-top:.2rem; }

    /* TABLE */
    .table-card { background:var(--white); overflow:hidden; border-radius:4px; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; font-size:.67rem; text-transform:uppercase; letter-spacing:.1em; color:#9aa0c8; border-bottom:2px solid var(--paper); padding:.6rem 1rem; font-weight:700; }
    td { padding:.65rem 1rem; border-bottom:1px solid var(--paper); font-size:.86rem; vertical-align:middle; }
    tr:last-child td { border:none; }
    tr:hover td { background:#f8f9ff; }

    /* BADGES */
    .badge { display:inline-block; padding:.18rem .62rem; border-radius:20px; font-size:.68rem; font-weight:700; }
    .badge-green  { background:#d4edda; color:#155724; }
    .badge-blue   { background:#dde4ff; color:#2236b0; }
    .badge-yellow { background:#fff3cd; color:#856404; }
    .badge-red    { background:#fde8e8; color:#7a1010; }
    .badge-gray   { background:#e2e3e5; color:#5a6070; }

    /* PROGRESS */
    .prog-wrap { display:flex; align-items:center; gap:.6rem; }
    .prog { background:#eaecff; height:7px; border-radius:4px; flex:1; min-width:60px; }
    .prog-fill { height:100%; border-radius:4px; }

    /* PROJ CARD */
    .proj-list { display:flex; flex-direction:column; gap:.9rem; }
    .proj-card { background:var(--white); padding:1.2rem 1.4rem; border-left:4px solid var(--border); text-decoration:none; color:var(--navy); display:block; transition:border-color .15s; border-radius:0 4px 4px 0; }
    .proj-card:hover { border-left-color:var(--accent); }
    .proj-row { display:flex; align-items:flex-start; justify-content:space-between; gap:.8rem; margin-bottom:.45rem; }
    .proj-card h3 { font-family:'Montserrat',sans-serif; font-weight:700; font-size:1rem; color:var(--navy); }
    .proj-meta { font-size:.76rem; color:var(--muted); display:flex; gap:.9rem; flex-wrap:wrap; margin-bottom:.6rem; }

    /* MEMBER GRID */
    .member-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:1.1rem; }
    .member-card { background:var(--white); padding:1.3rem 1.2rem; border-radius:4px; border-bottom:3px solid transparent; transition:border-color .15s; }
    .member-card:hover { border-bottom-color:var(--accent); }
    .member-avatar {
      width:46px; height:46px; border-radius:50%;
      background:linear-gradient(135deg,var(--navy),var(--accent));
      color:#fff; font-family:'Montserrat',sans-serif; font-weight:900; font-size:1.1rem;
      display:flex; align-items:center; justify-content:center; margin-bottom:.8rem;
    }
    .member-nome  { font-weight:700; font-size:.92rem; color:var(--navy); }
    .member-cargo { font-size:.78rem; color:var(--muted); margin-top:.15rem; }
    .member-email { font-size:.72rem; color:#a0a8c8; margin-top:.45rem; word-break:break-all; }
    .member-badge { margin-top:.5rem; }

    /* PUB GRID */
    .pub-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1.1rem; }
    .pub-card { background:var(--white); padding:1.2rem; border-top:3px solid var(--accent); border-radius:0 0 4px 4px; text-decoration:none; color:var(--navy); display:block; transition:box-shadow .15s; }
    .pub-card:hover { box-shadow:0 4px 18px rgba(79,93,232,.12); }
    .pub-cat { font-size:.67rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--accent); margin-bottom:.4rem; }
    .pub-card h3 { font-family:'Montserrat',sans-serif; font-weight:700; font-size:.95rem; color:var(--navy); margin-bottom:.4rem; }
    .pub-card p  { font-size:.82rem; color:var(--muted); overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }
    .pub-card .meta { font-size:.7rem; color:#a0a8c8; margin-top:.6rem; }

    /* TIMELINE */
    .timeline { position:relative; padding-left:1.4rem; }
    .timeline::before { content:''; position:absolute; left:0; top:4px; bottom:0; width:2px; background:var(--border); }
    .tl-item { position:relative; margin-bottom:1.3rem; }
    .tl-dot { position:absolute; left:-1.75rem; top:.4rem; width:9px; height:9px; border-radius:50%; background:var(--accent); border:2px solid var(--white); box-shadow:0 0 0 2px var(--accent); }
    .tl-proj { font-size:.7rem; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.2rem; }
    .tl-date { font-size:.7rem; color:var(--muted); margin-bottom:.2rem; }
    .tl-text { font-size:.88rem; background:var(--white); padding:.75rem 1rem; border-radius:4px; color:var(--navy); line-height:1.5; }

    /* MISC */
    .vazio { text-align:center; padding:3rem; color:var(--muted); font-size:.9rem; }
    .section-title { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1rem; color:var(--navy); border-bottom:2px solid var(--border); padding-bottom:.4rem; margin-bottom:1.2rem; text-transform:uppercase; letter-spacing:.04em; }
    .filtros { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.3rem; }
    .filtro-btn { padding:.32rem .8rem; border:1.5px solid var(--border); background:var(--white); font-family:inherit; font-size:.76rem; font-weight:700; cursor:pointer; text-decoration:none; color:var(--muted); border-radius:4px; transition:all .14s; }
    .filtro-btn:hover { border-color:var(--accent); color:var(--accent); }
    .filtro-btn.active { background:var(--navy); color:#fff; border-color:var(--navy); }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; align-items:start; }

    /* EVENTO CARD */
    .ev-card { background:var(--white); padding:1rem 1.2rem; border-left:4px solid var(--accent); border-radius:0 4px 4px 0; margin-bottom:.8rem; }
    .ev-card h4 { font-family:'Montserrat',sans-serif; font-weight:700; font-size:.92rem; color:var(--navy); margin-bottom:.3rem; }
    .ev-meta { font-size:.75rem; color:var(--muted); display:flex; gap:.8rem; flex-wrap:wrap; }

    @media(max-width:800px){ .sidebar{display:none} .main-content{padding:1rem} .grid-2{grid-template-columns:1fr} }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>

<div class="topbar">
  <a href="{{ url_for('index') }}" class="topbar-brand">NEXO <span class="n">NEWS</span></a>
  <div class="topbar-links">
    <a href="{{ url_for('secretarias') }}">← Todas as Secretarias</a>
    <a href="{{ url_for('calendario') }}">Calendário</a>
    <a href="{{ url_for('admin_login') }}">Admin</a>
  </div>
</div>

<div class="shell">
  <aside class="sidebar">
    <div class="sec-header">
      <div class="sec-label">Secretaria</div>
      <div class="sec-nome">{{ secretaria }}</div>
    </div>
    <nav class="sidebar-nav">
      <a href="{{ url_for('sec_visao_geral', secretaria=secretaria) }}"
         class="{{ 'active' if request.endpoint=='sec_visao_geral' }}">
        <span class="icon">📊</span> Visão Geral
      </a>
      <a href="{{ url_for('sec_projetos', secretaria=secretaria) }}"
         class="{{ 'active' if request.endpoint=='sec_projetos' }}">
        <span class="icon">🚧</span> Projetos
      </a>
      <a href="{{ url_for('sec_membros', secretaria=secretaria) }}"
         class="{{ 'active' if request.endpoint=='sec_membros' }}">
        <span class="icon">👥</span> Membros
      </a>
      <a href="{{ url_for('sec_publicacoes', secretaria=secretaria) }}"
         class="{{ 'active' if request.endpoint=='sec_publicacoes' }}">
        <span class="icon">📰</span> Publicações
      </a>
      <a href="{{ url_for('sec_eventos', secretaria=secretaria) }}"
         class="{{ 'active' if request.endpoint=='sec_eventos' }}">
        <span class="icon">📅</span> Eventos
      </a>
    </nav>
    <div class="sidebar-back">
      <a href="{{ url_for('secretarias') }}">← Voltar ao painel</a>
    </div>
  </aside>

  <div class="main-content">
    {% block content %}{% endblock %}
  </div>
</div>

</body>
</html>
