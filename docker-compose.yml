services:

  db:
    image: postgres:16-alpine
    container_name: news_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: newsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d newsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: news_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: newsdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      ADMIN_USER: admin
      ADMIN_PASS: admin123
      SECRET_KEY: openssl rand -hex 32
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: "lisloureiro.sousa@gmail.com"
      SMTP_PASS: "gbgq dkll ccgl oopu"
      SMTP_FROM: "lisloureiro.sousa@gmail.com"
    volumes:
      # Monta templates e static como volumes — mudanças aparecem sem rebuild
      - ./templates:/app/templates
      - ./static:/app/static
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: news_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexonews.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: "1"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin_servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data: