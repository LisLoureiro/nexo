{% block extra_styles %}
<style>
.page-titulo { font-family:'Montserrat',sans-serif; font-weight:900; font-size:2rem; margin-bottom:.4rem; padding-bottom:.6rem; border-bottom:2px solid var(--navy); }
.sec-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.5rem; margin-top:1.5rem; }
.sec-card { background:var(--white); padding:0; color:var(--navy); display:block; border-bottom:3px solid transparent; transition:border-color .2s, transform .2s, box-shadow .2s; overflow:hidden; }
.sec-card:hover { border-bottom-color:var(--accent); transform:translateY(-3px); box-shadow:0 8px 24px rgba(79,93,232,.12); }
.sec-card-header { background:var(--navy); padding:1.2rem 1.5rem; }
.sec-card-header h2 { font-family:'Montserrat',sans-serif; font-weight:900; color:#fff; font-size:1.1rem; }
.sec-card-body { padding:1.2rem 1.5rem; }
.sec-stats { display:flex; gap:1.5rem; margin-bottom:1rem; }
.sec-stat .n { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1.5rem; color:var(--accent); }
.sec-stat .l { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.bar { background:#eaecff; height:5px; border-radius:3px; }
.bar-fill { background:var(--accent); height:100%; border-radius:3px; }
.sec-links { display:flex; gap:.5rem; margin-top:1rem; flex-wrap:wrap; }
.sec-link { font-size:.73rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); text-decoration:none; padding:.25rem .6rem; border:1.5px solid var(--border); border-radius:3px; }
.sec-link:hover { color:var(--accent); border-color:var(--accent); }
.vazio { text-align:center; padding:4rem; color:var(--muted); }
</style>
{% endblock %}
