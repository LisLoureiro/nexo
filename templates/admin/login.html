<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — Nexo News</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Source Sans 3',sans-serif;
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      background: linear-gradient(135deg, #0d1b4b 0%, #1a2e8a 50%, #0d1b4b 100%);
      position: relative; overflow: hidden;
    }
    body::before {
      content:'';
      position:absolute; top:-80px; right:-80px;
      width:320px; height:320px; border-radius:50%;
      background:radial-gradient(circle, rgba(111,124,255,.3) 0%, transparent 70%);
    }
    body::after {
      content:'';
      position:absolute; bottom:-60px; left:-60px;
      width:240px; height:240px; border-radius:50%;
      background:radial-gradient(circle, rgba(79,93,232,.25) 0%, transparent 70%);
    }
    .card {
      background:#fff; width:400px; max-width:94vw;
      padding:2.5rem; border-radius:8px;
      box-shadow:0 24px 60px rgba(13,27,75,.4);
      position:relative; z-index:1;
    }
    .logo {
      text-align:center; margin-bottom:.3rem;
      font-family:'Montserrat',sans-serif; font-size:1.8rem; font-weight:900; letter-spacing:-1px;
      display:flex; align-items:center; justify-content:center; gap:.4rem;
    }
    .logo .nexo { color:#0d1b4b; }
    .logo .news { background:#4f5de8; color:#fff; padding:.05rem .4rem; border-radius:4px; font-size:1.5rem; }
    .sub { text-align:center; color:#888; font-size:.82rem; margin-bottom:2rem; letter-spacing:.06em; text-transform:uppercase; }
    label { display:block; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; margin-bottom:.4rem; color:#444; }
    input {
      width:100%; padding:.65rem .9rem; border:1.5px solid #d0d5f0;
      font-family:inherit; font-size:.95rem; margin-bottom:1.2rem; border-radius:4px; outline:none;
    }
    input:focus { border-color:#4f5de8; }
    button {
      width:100%; background:#0d1b4b; color:#fff; border:none; padding:.78rem;
      font-family:'Montserrat',sans-serif; font-size:.9rem; font-weight:700;
      cursor:pointer; letter-spacing:.06em; border-radius:4px; transition:background .2s;
    }
    button:hover { background:#4f5de8; }
    .flash { background:#fde8e8; color:#7a1010; padding:.7rem; border-radius:4px; font-size:.85rem; margin-bottom:1rem; border-left:3px solid #e05252; }
    .back { display:block; text-align:center; margin-top:1.2rem; font-size:.78rem; color:#aaa; text-decoration:none; }
    .back:hover { color:#4f5de8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="nexo">NEXO</span><span class="news">NEWS</span></div>
    <div class="sub">Área Administrativa</div>

    {% with messages = get_flashed_messages(with_categories=True) %}
      {% for cat, msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <label>Usuário</label>
      <input type="text" name="usuario" autofocus required>
      <label>Senha</label>
      <input type="password" name="senha" required>
      <button type="submit">Entrar</button>
    </form>
    <a href="{{ url_for('index') }}" class="back">← Voltar ao portal</a>
  </div>
</body>
</html>
